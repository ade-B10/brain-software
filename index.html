<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Brain Software</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#1A1A1A;-webkit-font-smoothing:antialiased;line-height:1.6}

/* HERO - compact */
.hero{padding:24px 32px 14px;text-align:center;border-bottom:1px solid #eee}
.b10-logo{display:inline-block;margin-bottom:6px;text-decoration:none}
.b10-logo .b10-text{font-family:'Inter',sans-serif;font-size:22px;font-weight:900;color:#1A1A1A;letter-spacing:-0.5px;line-height:1}
.b10-logo sup{font-size:13px;font-weight:900;vertical-align:super;position:relative;top:-1px}
.b10-logo .b10-bar{display:block;width:22px;height:3px;background:#45AEEB;border-radius:2px;margin:-2px 0 0 auto}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-1px;color:#1A1A1A;margin-bottom:3px}
.hero .sub{font-size:12px;color:#888;font-weight:400}
.hero .sub em{color:#45AEEB;font-style:normal;font-weight:500}
.stats-row{display:flex;justify-content:center;gap:28px;margin-top:8px}
.stat .num{font-size:15px;font-weight:700;color:#1A1A1A}
.stat .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#aaa}

/* CONTROLS */
.controls{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid #eee;padding:10px 32px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.toggle-group{display:flex;background:#f5f5f5;border-radius:8px;overflow:hidden}
.toggle-btn{padding:6px 18px;font-size:12px;font-weight:600;border:none;background:transparent;color:#999;cursor:pointer;transition:all 0.2s}
.toggle-btn.active{background:#1A1A1A;color:#fff;border-radius:8px}
.toggle-btn:hover:not(.active){color:#555}
.search-box{background:#f5f5f5;border:1px solid #eee;border-radius:8px;padding:6px 14px;color:#1A1A1A;font-size:12px;font-family:inherit;width:220px;outline:none;transition:border-color 0.2s}
.search-box:focus{border-color:#45AEEB}
.search-box::placeholder{color:#bbb}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;padding:24px 32px 48px}

/* TOPIC VIEW */
.topic-section{margin-bottom:40px}
.topic-header{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.topic-icon{font-size:14px}
.quote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

.quote-card{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:20px;transition:all 0.2s;position:relative}
.quote-card:hover{border-color:#ddd;box-shadow:0 4px 20px rgba(0,0,0,0.04);transform:translateY(-1px)}
.quote-text{font-size:14px;line-height:1.7;color:#333;margin-bottom:14px;font-weight:400}
.quote-footer{display:flex;align-items:center;gap:10px}
.avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#f0f0f0}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-initials{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#999;flex-shrink:0}
.quote-author{font-size:12px;font-weight:600;color:#555}
.quote-source{font-size:10px;color:#aaa;margin-top:1px}
.quote-source a{color:#45AEEB;text-decoration:none;opacity:0.8}
.quote-source a:hover{opacity:1;text-decoration:underline}

/* FOUNDER VIEW */
.founder-section{margin-bottom:40px}
.founder-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.founder-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#f0f0f0}
.founder-avatar img{width:100%;height:100%;object-fit:cover}
.founder-avatar-initials{font-size:14px;font-weight:700;color:#999}
.founder-info h3{font-size:16px;font-weight:700;color:#1A1A1A;letter-spacing:-0.3px}
.founder-info .founder-meta{font-size:11px;color:#aaa}
.founder-info .founder-meta a{color:#45AEEB;text-decoration:none}
.founder-quotes-list{display:flex;flex-direction:column;gap:10px}
.founder-quote-item{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:16px 20px;font-size:14px;line-height:1.7;color:#333;transition:border-color 0.2s}
.founder-quote-item:hover{border-color:#ddd}
.founder-quote-item .topic-tag{display:inline-block;font-size:9px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#999;background:#f0f0f0;padding:2px 7px;border-radius:3px;margin-top:8px}

/* FOOTER */
.page-footer{text-align:center;padding:32px;border-top:1px solid #eee;margin-top:32px}
.page-footer .b10-logo{display:inline-block;margin-bottom:6px}
.page-footer .fnote{font-size:11px;color:#bbb}
.page-footer .fnote a{color:#45AEEB;text-decoration:none;opacity:0.6}
.podcast-link{display:inline-block;margin-top:8px;font-size:11px;color:#aaa;text-decoration:none;transition:color 0.2s}
.podcast-link:hover{color:#45AEEB}

.no-results{text-align:center;padding:48px;color:#aaa;font-size:14px}
.hidden{display:none!important}

@media(max-width:640px){
  .quote-grid{grid-template-columns:1fr}
  .controls{padding:8px 16px}
  .search-box{width:100%;order:10}
  .container{padding:16px}
  .stats-row{gap:20px}
}

.quote-card,.founder-quote-item{opacity:0;transform:translateY(8px);animation:fadeUp 0.35s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.quote-grid .quote-card:nth-child(1){animation-delay:.02s}
.quote-grid .quote-card:nth-child(2){animation-delay:.05s}
.quote-grid .quote-card:nth-child(3){animation-delay:.08s}
.quote-grid .quote-card:nth-child(4){animation-delay:.11s}
.quote-grid .quote-card:nth-child(5){animation-delay:.14s}
.quote-grid .quote-card:nth-child(6){animation-delay:.17s}
</style>
</head>

<div class="container" id="content"></div>

const ICONS={"Excellence & Standards":"\u2B50","Vision & Long-Term Thinking":"\uD83D\uDD2D","Entrepreneurship & Founders":"\uD83D\uDE80","Mindset & Character":"\uD83E\uDDE0","Learning & Wisdom":"\uD83D\uDCDA","Strategy & Competition":"\u265F\uFE0F","Selling & Persuasion":"\uD83C\uDFAF","Investing & Business":"\uD83D\uDCB0","Hiring & Talent":"\uD83D\uDC65","Authenticity & Identity":"\uD83C\uDFAD","Leadership":"\uD83D\uDCA1","Simplicity & Taste":"\u2728","Life & Values":"\uD83C\uDF1F"};
const ORDER=["Excellence & Standards","Mindset & Character","Entrepreneurship & Founders","Strategy & Competition","Investing & Business","Hiring & Talent","Vision & Long-Term Thinking","Leadership","Selling & Persuasion","Learning & Wisdom","Simplicity & Taste","Authenticity & Identity","Life & Values"];
let cv='topic',st='';
function gi(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}
function av(q){const u=IMGS[q.a];if(u)return`<div class="avatar"><img src="${u}" alt="${q.a}" loading="lazy"></div>`;return`<div class="avatar-initials">${gi(q.a)}</div>`;}
function src(q){let p=[];if(q.meta)p.push(q.meta);if(q.ep)p.push(`<a href="${q.ep}" target="_blank">Founders Podcast</a>`);return p.length?`<div class="quote-source">${p.join(' \u00B7 ')}</div>`:'';}

function rtv(f){const c=document.getElementById('content');let h='';for(const t of ORDER){const qs=f.filter(q=>q.topic===t);if(!qs.length)continue;h+=`<div class="topic-section"><div class="topic-header"><span class="topic-icon">${ICONS[t]||''}</span>${t}</div><div class="quote-grid">`;for(const q of qs){h+=`<div class="quote-card"><div class="quote-text">${q.t}</div>`;if(q.a){h+=`<div class="quote-footer">${av(q)}<div><div class="quote-author">${q.a}</div>${src(q)}</div></div>`;}else{h+=src(q);}h+=`</div>`;}h+=`</div></div>`;}if(!h)h='<div class="no-results">No quotes match your search.</div>';c.innerHTML=h;}

function rfv(f){const c=document.getElementById('content');const g={},na=[];for(const q of f){if(!q.a){na.push(q);continue;}if(!g[q.a])g[q.a]=[];g[q.a].push(q);}const s=Object.entries(g).sort((a,b)=>b[1].length-a[1].length);let h='';for(const[a,qs]of s){const sm=qs[0];h+=`<div class="founder-section"><div class="founder-header">`;{const u=IMGS[a];if(u){h+=`<div class="founder-avatar"><img src="${u}" alt="${a}" loading="lazy"></div>`;}else{h+=`<div class="founder-avatar"><span class="founder-avatar-initials">${gi(a)}</span></div>`;}}const ep=sm.ep?` \u00B7 <a href="${sm.ep}" target="_blank">Founders Podcast</a>`:'';const mt=sm.meta?` \u00B7 ${sm.meta}`:'';h+=`<div class="founder-info"><h3>${a}</h3><div class="founder-meta">${qs.length} quote${qs.length>1?'s':''}${mt}${ep}</div></div></div><div class="founder-quotes-list">`;for(const q of qs){h+=`<div class="founder-quote-item">${q.t}<div class="topic-tag">${q.topic}</div></div>`;}h+=`</div></div>`;}if(na.length){h+=`<div class="founder-section"><div class="founder-header"><div class="founder-avatar"><span class="founder-avatar-initials">?</span></div><div class="founder-info"><h3>Unattributed</h3><div class="founder-meta">${na.length} quotes</div></div></div><div class="founder-quotes-list">`;for(const q of na){h+=`<div class="founder-quote-item">${q.t}<div class="topic-tag">${q.topic}</div></div>`;}h+=`</div></div>`;}if(!h)h='<div class="no-results">No quotes match your search.</div>';c.innerHTML=h;}

function gf(){if(!st)return Q;const s=st.toLowerCase();return Q.filter(q=>q.t.toLowerCase().includes(s)||(q.a&&q.a.toLowerCase().includes(s))||q.topic.toLowerCase().includes(s)||(q.meta&&q.meta.toLowerCase().includes(s)));}
function render(){const f=gf();if(cv==='topic')rtv(f);else rfv(f);}
function switchView(v){cv=v;document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));render();}
function filterQuotes(v){st=v.trim();render();}
function ac(el,t){let c=0;const s=Math.max(1,Math.floor(t/25));const i=setInterval(()=>{c+=s;if(c>=t){c=t;clearInterval(i);}el.textContent=c;},25);}
document.addEventListener('DOMContentLoaded',()=>{render();ac(document.getElementById('qC'),Q.length);ac(document.getElementById('fC'),[...new Set(Q.filter(q=>q.a).map(q=>q.a))].length);ac(document.getElementById('tC'),[...new Set(Q.map(q=>q.topic))].length);});
</script>
